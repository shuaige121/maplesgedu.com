<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>广告投放监控 | SG枫叶留学</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #4A90D9;
  --primary-light: #6BA8E8;
  --primary-dark: #3A7BC8;
  --accent: #E84A27;
  --green: #A4C639;
  --green-light: #C5E06A;
  --sky: #A8D8EA;
  --text: #2D2D2D;
  --text-light: #666;
  --text-muted: #999;
  --bg: #ffffff;
  --bg-alt: #F5FAFC;
  --bg-card: #ffffff;
  --border: #E8EEF3;
  --shadow: 0 2px 12px rgba(74,144,217,0.08);
  --shadow-hover: 0 4px 20px rgba(74,144,217,0.14);
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg-alt); color:var(--text); line-height:1.5; }

/* Header */
.header { background:#fff; border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:20; }
.header-left { display:flex; align-items:center; gap:12px; }
.header-left img { height:40px; border-radius:8px; }
.header-left h1 { font-size:16px; font-weight:600; color:var(--text); }
.header-left h1 span { color:var(--primary); }
.header-right { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-muted); }
.live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Account Overview */
.overview { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; padding:16px 24px; }
.ov-card { background:var(--bg-card); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); border:1px solid var(--border); }
.ov-card .ov-label { font-size:11px; color:var(--text-muted); font-weight:500; text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.ov-card .ov-val { font-size:22px; font-weight:700; color:var(--text); }
.ov-card .ov-val.blue { color:var(--primary); }
.ov-card .ov-val.green { color:var(--green); }
.ov-card .ov-val.red { color:var(--accent); }
.ov-card .ov-sub { font-size:11px; color:var(--text-muted); margin-top:2px; }

/* Progress bar */
.progress { height:4px; background:var(--border); border-radius:2px; margin-top:6px; overflow:hidden; }
.progress .bar { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--primary),var(--primary-light)); transition:width .5s; }

/* Tabs */
.tabs { display:flex; gap:0; padding:0 24px; background:#fff; border-bottom:1px solid var(--border); }
.tab { padding:10px 20px; cursor:pointer; font-size:13px; font-weight:500; color:var(--text-muted); border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .2s; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--primary); border-bottom-color:var(--primary); }

/* Section */
.section { padding:16px 24px; }
.section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.section-title { font-size:14px; font-weight:600; color:var(--text); }
.section-sub { font-size:12px; color:var(--text-muted); }

/* Trend Chart */
.chart-wrap { background:var(--bg-card); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); border:1px solid var(--border); margin-bottom:16px; }
.chart-wrap canvas { width:100%!important; height:140px!important; }
.chart-legend { display:flex; gap:16px; margin-top:8px; }
.chart-legend span { font-size:11px; color:var(--text-muted); display:flex; align-items:center; gap:4px; }
.chart-legend span::before { content:''; width:10px; height:3px; border-radius:2px; }
.legend-fee::before { background:var(--primary); }
.legend-msg::before { background:var(--accent); height:8px!important; width:6px!important; border-radius:1px; }

/* Note Cards */
.note-grid { display:flex; flex-direction:column; gap:10px; }
.note-card { background:var(--bg-card); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); display:flex; overflow:hidden; transition:all .2s; }
.note-card:hover { box-shadow:var(--shadow-hover); border-color:var(--primary-light); }
.note-thumb { width:90px; min-height:120px; background:var(--bg-alt); flex-shrink:0; position:relative; }
.note-thumb img { width:100%; height:100%; object-fit:cover; }
.note-thumb .placeholder { display:flex; align-items:center; justify-content:center; height:100%; }
.note-thumb .placeholder svg { width:24px; height:24px; color:#ccc; }
.note-rank { position:absolute; top:6px; left:6px; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; }
.note-rank.g { background:linear-gradient(135deg,#FFD700,#FFA000); }
.note-rank.s { background:linear-gradient(135deg,#B0BEC5,#78909C); }
.note-rank.b { background:linear-gradient(135deg,#CD7F32,#A0522D); }
.note-rank.n { background:var(--border); color:var(--text-muted); }
.note-body { flex:1; padding:10px 14px; display:flex; flex-direction:column; gap:6px; min-width:0; }
.note-title { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.note-title a { color:var(--primary); font-size:12px; font-weight:400; margin-left:6px; }
.note-title a:hover { color:var(--accent); }
.spend-bar { height:3px; background:var(--border); border-radius:2px; }
.spend-bar .fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--primary),var(--sky)); }
.note-metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:4px 8px; }
.nm { font-size:11px; }
.nm .v { font-size:14px; font-weight:600; color:var(--text); }
.nm .l { color:var(--text-muted); font-size:10px; }
.nm.good .v { color:#2E7D32; }
.nm.warn .v { color:var(--accent); }

.empty { text-align:center; padding:48px 20px; color:var(--text-muted); font-size:14px; }

/* Footer */
.footer { text-align:center; padding:24px; font-size:11px; color:var(--text-muted); }
.footer a { color:var(--primary); }

@media(max-width:640px) {
  .header { padding:10px 16px; }
  .overview { grid-template-columns:repeat(2,1fr); padding:12px 16px; gap:8px; }
  .section { padding:12px 16px; }
  .tabs { padding:0 16px; }
  .note-thumb { width:72px; min-height:96px; }
  .note-metrics { grid-template-columns:repeat(3,1fr); }
  .ov-card .ov-val { font-size:18px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="../images/logo.jpg" alt="SG枫叶留学">
    <h1><span>聚光</span>投放监控</h1>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <span id="updateTime">加载中...</span>
  </div>
</div>

<div class="overview" id="overview"></div>

<div class="tabs" id="tabs">
  <div class="tab active" data-range="today">今日实时</div>
  <div class="tab" data-range="week">近 7 天</div>
  <div class="tab" data-range="month">近 30 天</div>
  <div class="tab" data-range="all">全部</div>
</div>

<div class="section">
  <div class="section-head">
    <div class="section-title">每日趋势</div>
    <div class="chart-legend">
      <span class="legend-fee">消费</span>
      <span class="legend-msg">私信</span>
    </div>
  </div>
  <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
</div>

<div class="section">
  <div class="section-head">
    <div class="section-title" id="noteTitle">笔记排行</div>
    <div class="section-sub" id="noteCount"></div>
  </div>
  <div class="note-grid" id="noteGrid"><div class="empty">加载中...</div></div>
</div>

<div class="footer">
  <a href="../index.html">SG枫叶留学</a> · 聚光平台数据每小时自动更新
</div>

<script>
let D = null, range = 'today';

// SVG icons
const ICON = {
  image: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>',
  link: '↗',
};

async function load() {
  try {
    const r = await fetch('data.json?' + Date.now());
    D = await r.json();
    const t = new Date(D.updated_at);
    document.getElementById('updateTime').textContent = t.toLocaleString('zh-CN', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    renderOverview();
    renderTrend();
    renderNotes();
  } catch(e) { document.getElementById('noteGrid').innerHTML = '<div class="empty">数据加载失败，请稍后刷新</div>'; }
}

function renderOverview() {
  const a = D.account || {};
  const bal = a.balance || 0;
  const spend = a.today_spend || 0;
  const budget = a.daily_budget || 1;
  const pct = Math.min(Math.round(spend / (budget / 100) * 100), 100) || 0;
  const balClass = bal > 500000 ? 'blue' : bal > 100000 ? '' : 'red';

  document.getElementById('overview').innerHTML = `
    <div class="ov-card">
      <div class="ov-label">账户余额</div>
      <div class="ov-val ${balClass}">¥${(bal/100).toLocaleString('zh-CN',{maximumFractionDigits:0})}</div>
    </div>
    <div class="ov-card">
      <div class="ov-label">今日消费</div>
      <div class="ov-val">¥${spend.toFixed(0)}</div>
      <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
      <div class="ov-sub">日预算 ¥${(budget/100).toFixed(0)} · ${pct}%</div>
    </div>
    <div class="ov-card">
      <div class="ov-label">展现 / 点击</div>
      <div class="ov-val">${(a.today_impression||0).toLocaleString()}</div>
      <div class="ov-sub">${a.today_click||0} 点击 · CTR ${a.today_ctr||'0%'}</div>
    </div>
    <div class="ov-card">
      <div class="ov-label">私信 / 留资</div>
      <div class="ov-val blue">${a.today_message||0}</div>
      <div class="ov-sub">${a.today_leads||0} 留资${a.today_message > 0 ? ' · ¥'+(spend/a.today_message).toFixed(0)+'/条' : ''}</div>
    </div>
  `;
}

function renderTrend() {
  const canvas = document.getElementById('trendChart');
  const ctx = canvas.getContext('2d');
  const trend = D.daily_trend || [];
  if (trend.length < 2) { return; }

  const W = canvas.parentElement.clientWidth - 32;
  const H = 140;
  canvas.width = W * 2; canvas.height = H * 2;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.scale(2,2);

  const fees = trend.map(d=>d.fee);
  const maxFee = Math.max(...fees,1);
  const msgs = trend.map(d=>d.message_consult);
  const maxMsg = Math.max(...msgs,1);
  const pad = {l:44,r:12,t:12,b:22};
  const cw = W-pad.l-pad.r, ch = H-pad.t-pad.b;

  // Grid lines
  ctx.strokeStyle = '#E8EEF3'; ctx.lineWidth = 0.5;
  for (let i=0;i<=4;i++) {
    const y = pad.t + ch * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
  }

  // Fee area
  ctx.beginPath();
  trend.forEach((d,i) => {
    const x = pad.l + (i/(trend.length-1))*cw;
    const y = pad.t + ch - (d.fee/maxFee)*ch;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  const lastX = pad.l + cw;
  ctx.lineTo(lastX, pad.t+ch); ctx.lineTo(pad.l, pad.t+ch); ctx.closePath();
  ctx.fillStyle = 'rgba(74,144,217,0.08)'; ctx.fill();

  // Fee line
  ctx.beginPath();
  trend.forEach((d,i) => {
    const x = pad.l + (i/(trend.length-1))*cw;
    const y = pad.t + ch - (d.fee/maxFee)*ch;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.strokeStyle = '#4A90D9'; ctx.lineWidth = 2; ctx.stroke();

  // Dots on fee line
  trend.forEach((d,i) => {
    const x = pad.l + (i/(trend.length-1))*cw;
    const y = pad.t + ch - (d.fee/maxFee)*ch;
    ctx.beginPath(); ctx.arc(x,y,2.5,0,Math.PI*2);
    ctx.fillStyle='#4A90D9'; ctx.fill();
  });

  // Message bars
  const bw = Math.max(cw/trend.length*0.35, 3);
  trend.forEach((d,i) => {
    if (!d.message_consult) return;
    const x = pad.l + (i/(trend.length-1))*cw - bw/2;
    const h = (d.message_consult/maxMsg)*ch*0.6;
    ctx.fillStyle = 'rgba(232,74,39,0.5)';
    ctx.fillRect(x, pad.t+ch-h, bw, h);
  });

  // Axis labels
  ctx.fillStyle = '#999'; ctx.font = '10px Inter,sans-serif'; ctx.textAlign='left';
  ctx.fillText(trend[0].date.slice(5), pad.l, H-4);
  ctx.textAlign='right';
  ctx.fillText(trend[trend.length-1].date.slice(5), W-pad.r, H-4);
  ctx.textAlign='left';
  ctx.fillStyle='#4A90D9'; ctx.fillText('¥'+maxFee.toFixed(0), 2, pad.t+10);
}

function renderNotes() {
  const rng = D.ranges[range];
  if (!rng) return;
  const notes = rng.notes || [];
  document.getElementById('noteTitle').textContent = rng.label + '笔记排行';
  document.getElementById('noteCount').textContent = notes.length + ' 篇';

  if (!notes.length) {
    document.getElementById('noteGrid').innerHTML = '<div class="empty">该时段暂无投放数据</div>';
    return;
  }

  const maxFee = Math.max(...notes.map(n=>n.fee),1);

  document.getElementById('noteGrid').innerHTML = notes.map((n,i) => {
    const thumb = D.thumbnails[n.note_id];
    const link = `https://www.xiaohongshu.com/explore/${n.note_id}`;
    const pct = (n.fee/maxFee*100).toFixed(0);
    const rc = i===0?'g':i===1?'s':i===2?'b':'n';

    const cplVal = n.cpl > 0 ? '¥'+n.cpl : '-';
    const cplClass = n.cpl > 0 ? (n.cpl < 400 ? 'good' : n.cpl > 800 ? 'warn' : '') : '';
    const mcVal = n.msg_cost > 0 ? '¥'+n.msg_cost : '-';

    return `<div class="note-card">
      <div class="note-thumb">
        <span class="note-rank ${rc}">${i+1}</span>
        ${thumb
          ? `<a href="${link}" target="_blank" rel="noopener"><img src="${thumb}" alt="" loading="lazy"></a>`
          : `<a href="${link}" target="_blank" rel="noopener"><div class="placeholder">${ICON.image}</div></a>`}
      </div>
      <div class="note-body">
        <div class="note-title">${n.name||n.note_id.slice(-8)}<a href="${link}" target="_blank" rel="noopener">${ICON.link}</a></div>
        <div class="spend-bar"><div class="fill" style="width:${pct}%"></div></div>
        <div class="note-metrics">
          <div class="nm"><div class="v">¥${n.fee.toFixed(0)}</div><div class="l">消费</div></div>
          <div class="nm"><div class="v">${n.impression.toLocaleString()}</div><div class="l">展现</div></div>
          <div class="nm"><div class="v">${n.click}</div><div class="l">点击</div></div>
          <div class="nm"><div class="v">${n.ctr}</div><div class="l">CTR</div></div>
          <div class="nm"><div class="v">¥${n.cpc||0}</div><div class="l">CPC</div></div>
          <div class="nm"><div class="v">${n.message_consult}</div><div class="l">私信</div></div>
          <div class="nm ${cplClass}"><div class="v">${cplVal}</div><div class="l">留资成本</div></div>
          <div class="nm"><div class="v">${n.msg_leads_num}</div><div class="l">留资</div></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('tabs').addEventListener('click', e => {
  const t = e.target.closest('.tab');
  if (!t) return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  range = t.dataset.range;
  renderNotes();
});

load();
setInterval(load, 300000);
</script>
</body>
</html>
